<!DOCTYPE html>
<html>
<head>

<title>LAPTOK - Laptops renovadas</title>

  margin: 10px 0;
}

  font-weight: bold;
}

button {
  padding: 12px;
  margin-top: 10px;
  border: none;
  background: #00ff88;
  cursor: pointer;
  width: 100%;

<body>

  <div class="grid">

      <a href="https://wa.me/51TU_NUMERO?text=Hola%20quiero%20una%20laptop%20similar%20a%20la%20Mario%20Edition">

      </a>

  </div>
</div>

<div class="section">

  <p>Completa este formulario y te contactamos solo si eres cliente real</p>

    <button>Solicitar laptop</button>
  </a>

</html>
