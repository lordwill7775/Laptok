<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAPTOK</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
}

/* HERO */
.hero {
  height:100vh;
  background:url('https://images.unsplash.com/photo-1517336714731-489689fd1ca8') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero-content {
  background:rgba(0,0,0,0.7);
  padding:30px;
  border-radius:10px;
}

.hero h1 {
  font-size:45px;
}

.btn {
  padding:15px 25px;
  background:#00ff88;
  border:none;
  cursor:pointer;
  font-size:16px;
  margin-top:10px;
}

/* CATÁLOGO */
.section {
  padding:40px 20px;
  text-align:center;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card {
  background:#111;
  padding:15px;
  border-radius:10px;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
}

.card img {
  width:100%;
  border-radius:10px;
}

.price {
  color:#00ff88;
  font-size:20px;
}

.sold {
  color:red;
}

/* ANTES DESPUÉS */
.compare {
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
}

.compare img {
  width:300px;
  border-radius:10px;
}

/* WHATSAPP */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  font-size:20px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>LAPTOK 🔥</h1>
    <p>No compres otra laptop… renueva la tuya</p>
    <a href="https://wa.me/51TU_NUMERO?text=Hola%20quiero%20una%20laptop">
      <button class="btn">Escríbeme ahora</button>
    </a>
  </div>
</div>

<!-- CATÁLOGO -->
<div class="section">
  <h2>Modelos recientes</h2>

  <div class="grid">

    <div class="card">
      <img src="https://i.imgur.com/hkLfEli.jpeg">
      <h3>Mario Edition</h3>
      <div class="price">S/450</div>
      <div class="sold">VENDIDO</div>
      <a href="https://wa.me/51TU_NUMERO?text=Quiero%20una%20similar%20a%20Mario">
        <button class="btn">Quiero una similar</button>
      </a>
    </div>

    <div class="card">
      <img src="https://i.imgur.com/pxxZAs0.jpeg">
      <h3>Spiderman Edition</h3>
      <div class="price">S/480</div>
      <a href="https://wa.me/51TU_NUMERO?text=Quiero%20la%20Spiderman">
        <button class="btn">Consultar</button>
      </a>
    </div>

  </div>
</div>

<!-- TRANSFORMACIÓN -->
<div class="section">
  <h2>Transformación real</h2>

  <div class="compare">
    <img src="LINK_ANTES">
    <img src="LINK_DESPUES">
  </div>

  <p>De esto… a esto 🔥</p>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/51962349840">💬</a>

</body>
</html>
